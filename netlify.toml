[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # VITE_-prefixed vars are intentionally public — Vite inlines them into the
  # client bundle by design, and the Supabase URL/publishable key are meant
  # to be exposed to the browser. Netlify's secret scanner otherwise flags
  # any repo/build-output occurrence of these values as a leak.
  SECRETS_SCAN_OMIT_KEYS = "VITE_SUPABASE_URL,VITE_SUPABASE_PUBLISHABLE_KEY"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
